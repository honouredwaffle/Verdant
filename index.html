<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verdant</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden}
canvas{display:block;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const T=32,W=800,H=600;canvas.width=W;canvas.height=H;
const WW=160*T,WH=120*T,TX=80*T,TY=60*T;
let disc=new Set(),player={x:20*T,y:20*T,vx:0,vy:0,w:24,h:32,sp:3.5,hp:100,mh:100},cam={x:0,y:0},keys={},mouse={x:0,y:0,dn:false};
let inv={wood:0,hide:0,bone:0,gold:0},equipped='sword',trees=[],creatures=[],shopBuilt=false,shopPlat=null,msg='',msgTimer=0,showMap=false,showInv=false,selSlot=-1;
let gearSlots={helmet:null,chest:null,weapon:'sword',boots:null};
const GEAR={
  sword:{name:'Sword',type:'weapon',desc:'Basic blade',atk:15},
  axe:{name:'Axe',type:'weapon',desc:'Chops trees',atk:10},
  wood_helm:{name:'Wood Helm',type:'helmet',desc:'+10 HP',hpb:10},
  hide_vest:{name:'Hide Vest',type:'chest',desc:'+15 HP',hpb:15},
  bone_boots:{name:'Bone Boots',type:'boots',desc:'+5 HP',hpb:5}
};
const CRAFT=[
  {need:{wood:5},give:{type:'wood_helm',qty:1},label:'Wood Helm'},
  {need:{hide:3,bone:2},give:{type:'hide_vest',qty:1},label:'Hide Vest'},
  {need:{hide:2,bone:3},give:{type:'bone_boots',qty:1},label:'Bone Boots'}
];
for(let i=0;i<120;i++){let x,y;do{x=Math.random()*WW;y=Math.random()*WH}while(Math.abs(x-TX)<400&&Math.abs(y-TY)<300);trees.push({x,y,sz:28+Math.random()*20,hp:3,rg:false})}
for(let i=0;i<25;i++){let x,y;do{x=Math.random()*WW;y=Math.random()*WH}while(Math.abs(x-TX)<=500&&Math.abs(y-TY)<=500);creatures.push({x,y,hp:20,mh:20,ty:Math.random()<.6?'deer':'wolf',st:'idle',tm:Math.random()*200,vx:0,vy:0,dr:Math.random()<.6?{ty:'hide',qt:1}:{ty:'bone',qt:1}})}
let dragon={x:TX+800,y:TY-600,hp:150,mh:150,ac:false,ag:false,tm:0,vx:0,vy:0};
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function w2s(wx,wy){return{x:wx-cam.x+W/2,y:wy-cam.y+H/2}}

function chopTree(px,py){let b=null,bd=Infinity;for(let t of trees){let dd=dist({x:px,y:py},{x:t.x,y:t.y});if(dd<60&&dd<bd){bd=dd;b=t}}if(!b||b.rg)return;b.hp--;if(b.hp<=0){inv.wood+=4+Math.floor(Math.random()*3);b.rg=true;setTimeout(()=>{b.hp=3;b.rg=false},30000);addMsg('+ Wood')}}
function attack(px,py,dir){
  let ax=px+Math.cos(dir)*40,ay=py+Math.sin(dir)*40,rg=50;
  for(let cr of creatures){if(cr.hp<=0)continue;if(dist({x:ax,y:ay},{x:cr.x,y:cr.y})<rg){let g=gearSlots.weapon?GEAR[gearSlots.weapon]:GEAR.sword;let dmg=(g?g.atk:15)+Math.floor(Math.random()*10);cr.hp-=dmg;cr.st='hit';cr.vx=Math.cos(dir)*6;cr.vy=Math.sin(dir)*6;if(cr.hp<=0){let d=cr.dr;inv[d.ty]=(inv[d.ty]||0)+d.qt;inv.bone=(inv.bone||0)+(cr.ty==='wolf'?1:0);addMsg('+'+d.qt+' '+d.ty);setTimeout(()=>{cr.x=Math.random()*WW;cr.y=Math.random()*WH;cr.hp=cr.mh},15000)}}}
  if(dragon.ac&&dist({x:ax,y:ay},{x:dragon.x,y:dragon.y})<60){let dmg=8+Math.floor(Math.random()*5);dragon.hp-=dmg;dragon.vx=Math.cos(dir)*8;dragon.vy=Math.sin(dir)*8;dragon.ag=true;if(dragon.hp<=0){addMsg('Dragon slain! +Scale');inv.hide=(inv.hide||0)+5;dragon.ac=false;setTimeout(()=>{dragon.hp=dragon.mh;dragon.x=TX+800+(Math.random()-.5)*400;dragon.y=TY-600+(Math.random()-.5)*400;dragon.ac=true;dragon.ag=false},60000)}}
}
function buildShop(){if(shopBuilt)return;if(inv.wood<20){addMsg('Need 20 wood');return}inv.wood-=20;shopBuilt=true;shopPlat={x:player.x,y:player.y};addMsg('Shop built!')}
function addMsg(m){msg=m;msgTimer=120}
function calcHp(){let b=100;if(gearSlots.helmet&&GEAR[gearSlots.helmet])b+=GEAR[gearSlots.helmet].hpb||0;if(gearSlots.chest&&GEAR[gearSlots.chest])b+=GEAR[gearSlots.chest].hpb||0;if(gearSlots.boots&&GEAR[gearSlots.boots])b+=GEAR[gearSlots.boots].hpb||0;player.mh=b;player.hp=Math.min(player.hp,player.mh)}
calcHp();

function update(){
  let mx=0,my=0;if(keys['w']||keys['ArrowUp'])my=-1;if(keys['s']||keys['ArrowDown'])my=1;if(keys['a']||keys['ArrowLeft'])mx=-1;if(keys['d']||keys['ArrowRight'])mx=1;if(mx&&my){mx*=.707;my*=.707}
  if(!showInv){player.vx+=mx*player.sp*.3;player.vy+=my*player.sp*.3;player.vx*=.8;player.vy*=.8;player.x+=player.vx;player.y+=player.vy;player.x=Math.max(16,Math.min(WW-16,player.x));player.y=Math.max(16,Math.min(WH-16,player.y));cam.x+=(player.x-cam.x)*.1;cam.y+=(player.y-cam.y)*.1}
  let cx=Math.floor(player.x/T),cy=Math.floor(player.y/T),cell=cx+','+cy;if(!disc.has(cell)){disc.add(cell);if(disc.size%20===0)addMsg('New area discovered!')}if(dist(player,{x:TX,y:TY})<300)disc.add('town');
  if(mouse.dn&&!showMap&&!showInv){mouse.dn=false;let dir=Math.atan2(mouse.y-H/2,mouse.x-W/2);if(equipped==='sword')attack(player.x,player.y,dir);else chopTree(player.x,player.y)}
  if(keys['b']&&!showInv){keys['b']=false;if(dist(player,{x:TX,y:TY})<300)buildShop();else addMsg('Find the town first!')}
  if(keys['m']&&!showInv){keys['m']=false;showMap=!showMap}
  if(keys['i']){keys['i']=false;showInv=!showInv}
  if(keys['q']&&!showInv){keys['q']=false;equipped=equipped==='sword'?'axe':'sword';gearSlots.weapon=equipped;addMsg('Equipped '+equipped)}
  if(msgTimer>0)msgTimer--;
  for(let cr of creatures){if(cr.hp<=0)continue;cr.tm--;let dd=dist(player,cr);if(dd<200){if(cr.ty==='deer'){let a=Math.atan2(cr.y-player.y,cr.x-player.x);cr.vx+=Math.cos(a)*.3;cr.vy+=Math.sin(a)*.3}else{let a=Math.atan2(player.y-cr.y,player.x-cr.x);cr.vx+=Math.cos(a)*.2;cr.vy+=Math.sin(a)*.2;if(dd<30&&cr.tm<=0){player.hp-=5;cr.tm=60;addMsg('-5 HP!')}}}else if(cr.tm<=0){cr.st='wander';cr.vx+=(Math.random()-.5)*.5;cr.vy+=(Math.random()-.5)*.5;cr.tm=60+Math.random()*120}cr.vx*=.9;cr.vy*=.9;cr.x+=cr.vx;cr.y+=cr.vy;cr.x=Math.max(16,Math.min(WW-16,cr.x));cr.y=Math.max(16,Math.min(WH-16,cr.y));if(cr.st==='hit'&&Math.abs(cr.vx)<.3&&Math.abs(cr.vy)<.3)cr.st='idle'}
  if(dragon.ac){let dd=dist(player,dragon);if(dd<500)dragon.ag=true;if(dragon.ag){let da=Math.atan2(player.y-dragon.y,player.x-dragon.x);dragon.vx+=Math.cos(da)*.15;dragon.vy+=Math.sin(da)*.15;if(dd<60&&dragon.tm<=0){player.hp-=15;dragon.tm=80;addMsg('Dragon claw! -15 HP!')}}else{dragon.vx+=(Math.random()-.5)*.2;dragon.vy+=(Math.random()-.5)*.2}dragon.vx*=.97;dragon.vy*=.97;dragon.x+=dragon.vx;dragon.y+=dragon.vy;if(dragon.tm>0)dragon.tm--}else{if(dist(player,{x:TX+800,y:TY-600})<600||Math.random()<.001&&player.x>WW/2)dragon.ac=true}
  if(player.hp<=0){player.hp=player.mh;player.x=20*T;player.y=20*T;addMsg('You died! Respawned');if(dragon.hp<=0){dragon.hp=dragon.mh;dragon.ac=true}}
}

// ---- DRAWING ----
function drawChar(sx,sy,w,h,col,armor){
  ctx.fillStyle=armor||col||'#2a6ab0';ctx.fillRect(sx-w/2,sy-h/2,w,h*.6);
  ctx.fillStyle='#e8c090';ctx.fillRect(sx-w*.3,sy-h/2-w*.2,w*.6,w*.3);
  ctx.fillStyle='#222';ctx.fillRect(sx-w*.15,sy-h/2-w*.08,3,3);ctx.fillRect(sx+w*.05,sy-h/2-w*.08,3,3);
  ctx.fillStyle='#1a3d6b';ctx.fillRect(sx-w*.3,sy+h*.1,w*.25,h*.3);ctx.fillRect(sx+w*.05,sy+h*.1,w*.25,h*.3);
  ctx.fillStyle='#e8c090';ctx.fillRect(sx-w*.5,sy-h*.15,w*.2,h*.3);ctx.fillRect(sx+w*.3,sy-h*.15,w*.2,h*.3);
  if(equipped==='sword'){ctx.fillStyle='#ccc';ctx.fillRect(sx+w*.45,sy-h*.2,4,20);ctx.fillStyle='#8B4513';ctx.fillRect(sx+w*.4,sy-h*.25,8,6)}
  else{ctx.fillStyle='#8B4513';ctx.fillRect(sx+w*.45,sy-h*.15,4,14);ctx.fillStyle='#666';ctx.fillRect(sx+w*.42,sy-h*.2,10,4)}
}
function drawDeer(sx,sy){
  ctx.fillStyle='#8B6914';ctx.beginPath();ctx.ellipse(sx,sy-2,12,8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6B4F12';ctx.beginPath();ctx.ellipse(sx-6,sy-12,6,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#5a3e0e';ctx.fillRect(sx-10,sy+6,3,8);ctx.fillRect(sx-3,sy+6,3,8);ctx.fillRect(sx+4,sy+6,3,8);ctx.fillRect(sx+11,sy+6,3,8);
  ctx.fillStyle='#fff';ctx.fillRect(sx-9,sy-16,2,2);ctx.fillRect(sx-5,sy-16,2,2);
  ctx.fillStyle='#3a2a08';ctx.fillRect(sx-2,sy-20,2,6);ctx.fillRect(sx+2,sy-20,2,6);
}
function drawWolf(sx,sy){
  ctx.fillStyle='#555';ctx.beginPath();ctx.ellipse(sx,sy-2,12,8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#444';ctx.beginPath();ctx.ellipse(sx-6,sy-12,6,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#666';ctx.fillRect(sx-10,sy+6,3,8);ctx.fillRect(sx-3,sy+6,3,8);ctx.fillRect(sx+4,sy+6,3,8);ctx.fillRect(sx+11,sy+6,3,8);
  ctx.fillStyle='#ff4';ctx.fillRect(sx-9,sy-16,2,2);ctx.fillRect(sx-5,sy-16,2,2);
  ctx.fillStyle='#888';ctx.fillRect(sx-1,sy-4,2,4);ctx.fillRect(sx+3,sy-4,2,4);
}
function drawDragon(sx,sy){
  ctx.fillStyle='#8B0000';ctx.beginPath();ctx.ellipse(sx,sy,20,12,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#a00000';ctx.fillRect(sx-4,sy-28,8,20);ctx.beginPath();ctx.ellipse(sx,sy-32,10,8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#333';ctx.fillRect(sx-8,sy-42,2,8);ctx.fillRect(sx+6,sy-42,2,8);
  ctx.fillStyle='#600';ctx.beginPath();ctx.moveTo(sx-16,sy-6);ctx.lineTo(sx-36,sy-34);ctx.lineTo(sx-14,sy-4);ctx.fill();
  ctx.beginPath();ctx.moveTo(sx+16,sy-6);ctx.lineTo(sx+36,sy-34);ctx.lineTo(sx+14,sy-4);ctx.fill();
  ctx.fillStyle='#8B0000';ctx.beginPath();ctx.moveTo(sx+16,sy+2);ctx.lineTo(sx+36,sy+6);ctx.lineTo(sx+32,sy+2);ctx.lineTo(sx+38,sy-2);ctx.fill();
  ctx.fillStyle='#ff0';ctx.fillRect(sx-6,sy-34,4,4);ctx.fillRect(sx+2,sy-34,4,4);
  ctx.fillStyle='#333';ctx.fillRect(sx-5,sy-33,2,2);ctx.fillRect(sx+3,sy-33,2,2);
  ctx.fillStyle='#333';ctx.fillRect(sx-30,sy-42,60,5);ctx.fillStyle='#f00';ctx.fillRect(sx-30,sy-42,60*(dragon.hp/dragon.mh),5);
}
function drawTown(sx,sy){
  ctx.fillStyle='#5a4a3a';ctx.fillRect(sx-150,sy-100,300,200);
  ctx.fillStyle='#7a5a3a';ctx.fillRect(sx-110,sy-80,50,60);ctx.fillStyle='#8a6a4a';ctx.fillRect(sx-40,sy-70,60,50);ctx.fillStyle='#7a5a3a';ctx.fillRect(sx+40,sy-80,50,60);
  ctx.fillStyle='#6a3a1a';ctx.beginPath();ctx.moveTo(sx-120,sy-80);ctx.lineTo(sx-85,sy-105);ctx.lineTo(sx-50,sy-80);ctx.fill();
  ctx.beginPath();ctx.moveTo(sx-50,sy-70);ctx.lineTo(sx-10,sy-90);ctx.lineTo(sx+30,sy-70);ctx.fill();
  ctx.beginPath();ctx.moveTo(sx+30,sy-80);ctx.lineTo(sx+65,sy-105);ctx.lineTo(sx+100,sy-80);ctx.fill();
  ctx.fillStyle='#ffd700';ctx.fillRect(sx-100,sy-70,10,10);ctx.fillRect(sx-80,sy-70,10,10);ctx.fillRect(sx-30,sy-60,10,10);ctx.fillRect(sx+50,sy-70,10,10);ctx.fillRect(sx+70,sy-70,10,10);
  ctx.fillStyle='#5a3a1a';ctx.fillRect(sx+90,sy-15,4,40);ctx.fillStyle='#3a2a1a';ctx.font='10px sans-serif';ctx.fillText('V E R D A N T',sx+60,sy-20);
  if(disc.has('town')){ctx.fillStyle='#ffd700';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText('✦ Verdant Town',sx,sy-115);ctx.textAlign='left'}
}
function drawInvScreen(){
  ctx.fillStyle='rgba(0,0,0,.85)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffd700';ctx.font='bold 20px sans-serif';ctx.textAlign='center';ctx.fillText('✦ INVENTORY ✦',W/2,35);ctx.textAlign='left';
  let rx=30,ry=55;ctx.fillStyle='#ddd';ctx.font='14px sans-serif';ctx.fillText('Resources',rx,ry);ry+=22;
  const RES=[{k:'wood',l:'🪵 Wood'},{k:'hide',l:'🦌 Hide'},{k:'bone',l:'🦴 Bone'},{k:'gold',l:'🪙 Gold'}];
  for(let r of RES){ctx.fillStyle='#aaa';ctx.fillText(r.l+': '+(inv[r.k]||0),rx+10,ry);ry+=20}
  ry+=10;ctx.fillStyle='#ddd';ctx.font='14px sans-serif';ctx.fillText('Equipment',rx,ry);ry+=25;
  const SLOTS=['helmet','weapon','chest','boots'];const SL=['Helmet','Weapon','Chest','Boots'];
  for(let i=0;i<SLOTS.length;i++){let sl=SLOTS[i],sn=gearSlots[sl];ctx.fillStyle='#333';ctx.fillRect(rx,ry,200,26);ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(rx,ry,200,26);ctx.fillStyle='#aaa';ctx.font='12px sans-serif';ctx.fillText(SL[i]+':',rx+5,ry+18);ctx.fillStyle=sn?'#4af':'#666';ctx.fillText(sn&&GEAR[sn]?GEAR[sn].name:'(empty)',rx+75,ry+18);ry+=30}
  ry+=10;ctx.fillStyle='#ddd';ctx.font='14px sans-serif';ctx.fillText('Craft',rx,ry);ry+=25;
  for(let cr of CRAFT){let can=true,need='';for(let nk in cr.need){need+=nk+': '+cr.need[nk]+' ';if((inv[nk]||0)<cr.need[nk])can=false}ctx.fillStyle=can?'#3a3':'#633';ctx.fillRect(rx,ry,280,28);ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(rx,ry,280,28);ctx.fillStyle=can?'#fff':'#888';ctx.font='12px sans-serif';ctx.fillText('['+cr.label+'] '+need,rx+8,ry+18);ry+=32}
  ctx.fillStyle='#888';ctx.font='11px sans-serif';ctx.fillText('Press I to close',W-130,ry+30);
}
function draw(){
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);
  if(showInv){drawInvScreen();canvas.onclick=function(e){};return}
  let startCX=Math.floor((cam.x-W/2)/T)-1,startCY=Math.floor((cam.y-H/2)/T)-1,endCX=Math.ceil((cam.x+W/2)/T)+1,endCY=Math.ceil((cam.y+H/2)/T)+1;
  for(let cy=startCY;cy<=endCY;cy++)for(let cx=startCX;cx<=endCX;cx++){let wx=cx*T,wy=cy*T,s=w2s(wx,wy);let sh=((cx*7+cy*13)%5)*5;ctx.fillStyle=`rgb(${30+sh},${80+sh},${30+sh})`;ctx.fillRect(s.x,s.y,T+1,T+1);if((cx+cy)%2===0){ctx.fillStyle=`rgba(0,0,0,0.05)`;ctx.fillRect(s.x,s.y,T+1,T+1)}}
  let tl=w2s(0,0),br=w2s(WW,WH);ctx.strokeStyle='#4a3a2a';ctx.lineWidth=4;ctx.strokeRect(tl.x,tl.y,br.x-tl.x,br.y-tl.y);
  for(let t of trees){if(t.rg)continue;let s=w2s(t.x,t.y);if(s.x<-50||s.x>W+50||s.y<-50||s.y>H+50)continue;ctx.fillStyle='#4a3728';ctx.fillRect(s.x-4,s.y-4,8,16);let r=t.sz/2;ctx.fillStyle=t.hp===3?'#2d5a27':t.hp===2?'#3a6b30':'#4a7a38';ctx.beginPath();ctx.arc(s.x,s.y-r/2,r,0,Math.PI*2);ctx.fill();ctx.fillStyle=t.hp===3?'#1e3d1a':'#2a4f22';ctx.beginPath();ctx.arc(s.x-3,s.y-r/2-3,r*.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(s.x+5,s.y-r/2+2,r*.4,0,Math.PI*2);ctx.fill()}
  for(let cr of creatures){if(cr.hp<=0)continue;let s=w2s(cr.x,cr.y);if(s.x<-30||s.x>W+30||s.y<-30||s.y>H+30)continue;cr.ty==='deer'?drawDeer(s.x,s.y):drawWolf(s.x,s.y);ctx.fillStyle='#333';ctx.fillRect(s.x-10,s.y-22,20,3);ctx.fillStyle='#0a0';ctx.fillRect(s.x-10,s.y-22,20*(cr.hp/cr.mh),3)}
  if(dragon.ac&&dragon.hp>0){let s=w2s(dragon.x,dragon.y);if(s.x>-100&&s.x<W+100&&s.y>-100&&s.y<H+100)drawDragon(s.x,s.y)}
  let st=w2s(TX,TY);if(st.x>-200&&st.x<W+200&&st.y>-200&&st.y<H+200)drawTown(st.x,st.y);
  if(shopPlat){let s=w2s(shopPlat.x,shopPlat.y);if(s.x>-50&&s.x<W+50&&s.y>-50&&s.y<H+50){ctx.fillStyle='#6B4226';ctx.fillRect(s.x-25,s.y-10,50,20);ctx.fillStyle='#8B5A2B';ctx.fillRect(s.x-22,s.y-12,44,8);ctx.fillStyle='#ffd700';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText('✦ Shop',s.x,s.y-18);ctx.textAlign='left'}}
  let sp=w2s(player.x,player.y);let armorCol=gearSlots.chest&&GEAR[gearSlots.chest]?'#8B5A2B':null;drawChar(sp.x,sp.y,player.w,player.h,'#2a6ab0',armorCol);
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(4,4,200,90);ctx.fillStyle='#fff';ctx.font='12px sans-serif';ctx.fillText('❤ HP: '+player.hp+'/'+player.mh,10,20);ctx.fillText('🪵 '+inv.wood,10,36);ctx.fillText('🦌 '+(inv.hide||0),10,52);ctx.fillText('🦴 '+(inv.bone||0),10,68);ctx.fillText('🪙 '+(inv.gold||0),10,84);
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(W-225,4,221,95);ctx.fillStyle='#aaa';ctx.font='11px sans-serif';ctx.fillText('WASD - Move',W-219,20);ctx.fillText('Click - Attack/Chop',W-219,36);ctx.fillText('Q - Swap weapon',W-219,52);ctx.fillText('M - Map  |  I - Inventory',W-219,68);ctx.fillText('B - Build shop (in town)',W-219,84);
  if(msgTimer>0){ctx.fillStyle=`rgba(255,255,255,${Math.min(1,msgTimer/30)})`;ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.fillText(msg,W/2,50);ctx.textAlign='left'}
  if(showMap){
    ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(0,0,W,H);let ms=Math.min(W/2/WW,H/2/WH)*1.5,mw=WW*ms,mh=WH*ms,mx2=(W-mw)/2,my2=60;
    ctx.strokeStyle='#4a6a3a';ctx.lineWidth=2;ctx.strokeRect(mx2,my2,mw,mh);ctx.fillStyle='rgba(20,60,20,.3)';ctx.fillRect(mx2,my2,mw,mh);
    let twx=mx2+TX*ms,twy=my2+TY*ms;if(disc.has('town')){ctx.fillStyle='#ffd700';ctx.font='20px sans-serif';ctx.fillText('✦',twx-8,twy+6);ctx.fillStyle='#ffd700';ctx.font='10px sans-serif';ctx.fillText('Town',twx+12,twy+5)}else{ctx.fillStyle='#666';ctx.fillRect(twx-4,twy-4,8,8)}
    let px=mx2+player.x*ms,py=my2+player.y*ms;ctx.fillStyle='#4af';ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.fill();
    if(dragon.ac&&dragon.hp>0){let dx=mx2+dragon.x*ms,dy=my2+dragon.y*ms;ctx.fillStyle='#f44';ctx.font='14px sans-serif';ctx.fillText('🐉',dx-7,dy+5)}
    ctx.fillStyle='rgba(100,200,100,.15)';for(let cl of disc){if(cl==='town')continue;let[cx,cy]=cl.split(',').map(Number);let dx=mx2+(cx*T)*ms,dy=my2+(cy*T)*ms;ctx.fillRect(dx,dy,T*ms+1,T*ms+1)}
    ctx.fillStyle='#aaa';ctx.font='12px sans-serif';ctx.fillText('Click discovered area to teleport',W/2-90,H-30);ctx.fillStyle='#fff';ctx.font='bold 14px sans-serif';ctx.fillText('✦ MAP ✦',W/2-20,40);window._md={mx:mx2,my:my2,ms:ms};
    canvas.onclick=function(e){let rect=canvas.getBoundingClientRect(),cx=(e.clientX-rect.left)*(canvas.width/rect.width),cy=(e.clientY-rect.top)*(canvas.height/rect.height);let md=window._md;if(!md)return;let best=null,bd=Infinity;for(let cl of disc){if(cl==='town'){let dx=md.mx+TX*md.ms,dy=md.my+TY*md.ms;let dd=Math.hypot(cx-dx,cy-dy);if(dd<20&&dd<bd){bd=dd;best='town'}continue}let[cxx,cyy]=cl.split(',').map(Number);let dx=md.mx+(cxx*T)*md.ms,dy=md.my+(cyy*T)*md.ms;let dd=Math.hypot(cx-dx,cy-dy);if(dd<20&&dd<bd){bd=dd;best=cl}}if(best==='town'){player.x=TX;player.y=TY;showMap=false;addMsg('Teleported to Town')}else if(best){let[cxx,cyy]=best.split(',').map(Number);player.x=cxx*T;player.y=cyy*T;showMap=false;addMsg('Teleported!')}};return
  }
  canvas.onclick=function(e){mouse.dn=true};
}
function loop(){update();draw();requestAnimationFrame(loop)}
window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if('mbiq'.includes(e.key))e.preventDefault()});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});
canvas.addEventListener('mousemove',e=>{let rect=canvas.getBoundingClientRect();mouse.x=(e.clientX-rect.left)*(canvas.width/rect.width);mouse.y=(e.clientY-rect.top)*(canvas.height/rect.height)});
loop();
</script>
